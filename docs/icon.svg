<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Percolate">
  <rect width="1024" height="1024" rx="224" fill="#231A14"/>
  <g transform="translate(512 512) rotate(-24)">
    <!-- coffee bean body -->
    <ellipse cx="0" cy="0" rx="258" ry="338" fill="#C19A53"/>
    <!-- center crease: an S-fold down the long axis -->
    <path d="M 0 -300 C 96 -150 -96 150 0 300"
          fill="none" stroke="#231A14" stroke-width="46" stroke-linecap="round"/>
    <!-- inner highlight to give the bean a roasted sheen -->
    <path d="M -150 -206 C -206 -64 -178 116 -98 244"
          fill="none" stroke="#F2E8D5" stroke-width="20" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>
